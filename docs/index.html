<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI 日报 · 初始化中</title>
<style>
  body{background:#0f172a;color:#e2e8f0;font-family:'PingFang SC',sans-serif;
  display:flex;justify-content:center;align-items:center;height:100vh;text-align:center;margin:0}
  h1{font-size:2rem;margin-bottom:12px} p{color:#94a3b8;font-size:15px}
  .badge{display:inline-block;background:#6366f1;color:#fff;padding:4px 14px;border-radius:999px;font-size:12px;margin-bottom:20px}
  .pulse{animation:pulse 2s infinite} @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
</style></head>
<body><div>
  <div class="badge">AI DAILY NEWS</div>
  <h1>🤖 AI 前沿日报</h1>
  <p class="pulse">⏳ 正在初始化，第一期日报将于今天 08:00 自动生成</p>
  <p style="margin-top:20px;font-size:13px">DeepSeek AI 深度解读 · 每日自动更新</p>
</div></body></html>
