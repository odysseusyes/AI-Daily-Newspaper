name: 📰 AI 日报自动生成

on:
  # 每天北京时间 08:00 = UTC 00:00
  schedule:
    - cron: "0 0 * * *"

  # 支持手动触发（在 Actions 页面点击 Run workflow）
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run（只生成，不发布）"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: write      # 提交文件
  issues: write        # 创建 Issue 通知

jobs:
  generate:
    name: 生成 AI 日报
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. 检出代码 ────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. 配置 Python ─────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. 安装依赖 ─────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 4. 运行日报生成器 ─────────────────────
      - name: Generate AI Daily News
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_BRANCH: main
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python main.py --dry-run --local
          else
            python main.py --local
          fi

      # ── 5. 上传本地产物（备份）────────────────
      - name: Upload output as artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily-report-${{ github.run_id }}
          path: output/
          retention-days: 30

      # ── 6. 失败通知（可选）───────────────────
      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '❌ AI 日报生成失败 · ' + new Date().toISOString().slice(0,10),
              body: `日报自动生成失败，请检查 Actions 日志：\n\n${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['bug', 'automated']
            })
